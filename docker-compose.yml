version: "3.8"
services:
  frontend:
    image: keicee32/e-commerce-client-app
    container_name: frontend
    env_file:
      - ./.env
    ports:
      - 3000:3000
    depends_on:
      - backend
    networks:
      - my-network
  
  backend:
    image: keicee32/e-commerce-server-app
    container_name: backend
    env_file:
      - ./.env
    ports:
      - 5000:5001
    networks:
      - my-network

networks:
  my-network:
    driver: bridge


